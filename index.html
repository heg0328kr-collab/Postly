<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post.ly</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --glass-bg: rgba(255,255,255,0.12);
    --glass-border: rgba(255,255,255,0.3);
    --glass-highlight: rgba(255,255,255,0.5);
    --glass-shadow: rgba(0,0,0,0.15);
    --text-primary: rgba(255,255,255,0.95);
    --text-secondary: rgba(255,255,255,0.6);
    --accent: rgba(120,180,255,0.9);
    --accent2: rgba(200,140,255,0.9);
    --blur: 28px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a0a1a;
    overflow-x: hidden;
    color: var(--text-primary);
  }

  /* ─── Animated background ─── */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(135deg, #0d0d2b 0%, #1a0a2e 40%, #0a1a2e 70%, #0d1520 100%);
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    animation: drift 12s ease-in-out infinite;
    opacity: 0.55;
  }
  .orb1 { width: 520px; height: 520px; background: radial-gradient(circle, #5b8dee 0%, #7c3aed 60%, transparent 100%); top: -120px; left: -80px; animation-delay: 0s; }
  .orb2 { width: 400px; height: 400px; background: radial-gradient(circle, #06b6d4 0%, #3b82f6 60%, transparent 100%); top: 30%; right: -100px; animation-delay: -4s; }
  .orb3 { width: 300px; height: 300px; background: radial-gradient(circle, #a855f7 0%, #ec4899 60%, transparent 100%); bottom: 5%; left: 20%; animation-delay: -8s; }
  .orb4 { width: 250px; height: 250px; background: radial-gradient(circle, #10b981 0%, #0891b2 60%, transparent 100%); bottom: 20%; right: 15%; animation-delay: -6s; }

  @keyframes drift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33%       { transform: translate(40px, -30px) scale(1.08); }
    66%       { transform: translate(-25px, 40px) scale(0.94); }
  }

  /* ─── Noise grain overlay ─── */
  .noise {
    position: fixed; inset: 0; z-index: 1;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  /* ─── Layout ─── */
  .container {
    position: relative; z-index: 2;
    max-width: 860px;
    margin: 0 auto;
    padding: 56px 24px 80px;
  }

  /* ─── Header ─── */
  header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) both;
  }

  .logo-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    border-radius: 100px;
    padding: 8px 20px;
    font-size: 13px;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .logo-pill span { width:6px; height:6px; border-radius:50%; background:var(--accent); display:inline-block; box-shadow:0 0 8px var(--accent); animation: pulse 2s ease infinite; }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.4)} }

  h1 {
    font-size: clamp(2rem, 6vw, 3.6rem);
    font-weight: 300;
    letter-spacing: -0.03em;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, rgba(180,200,255,0.9) 50%, rgba(200,150,255,0.8) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  .subtitle {
    color: var(--text-secondary);
    font-size: 15px;
    font-weight: 300;
  }

  /* ─── Glass card base ─── */
  .glass {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    box-shadow:
      0 2px 0 var(--glass-highlight) inset,
      0 -1px 0 rgba(0,0,0,0.1) inset,
      0 20px 60px var(--glass-shadow),
      0 4px 16px rgba(0,0,0,0.1);
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1), box-shadow 0.4s cubic-bezier(0.22,1,0.36,1);
  }

  /* ─── Write form ─── */
  .write-card {
    padding: 28px 32px;
    margin-bottom: 32px;
    animation: fadeUp 0.8s 0.15s cubic-bezier(0.22,1,0.36,1) both;
  }

  .write-header {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .write-header::before { content:''; display:block; width:3px; height:14px; border-radius:2px; background: linear-gradient(to bottom, var(--accent), var(--accent2)); }

  .field-wrap { margin-bottom: 14px; }

  .glass-input, .glass-textarea {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 15px;
    font-weight: 300;
    outline: none;
    transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .glass-input { padding: 14px 18px; }
  .glass-textarea { padding: 14px 18px; min-height: 100px; resize: vertical; line-height: 1.6; }

  .glass-input::placeholder, .glass-textarea::placeholder { color: rgba(255,255,255,0.3); }

  .glass-input:focus, .glass-textarea:focus {
    background: rgba(255,255,255,0.11);
    border-color: rgba(120,180,255,0.5);
    box-shadow: 0 0 0 3px rgba(120,180,255,0.12), 0 0 24px rgba(120,180,255,0.08);
  }

  .row { display: flex; gap: 12px; }
  .row .field-wrap { flex: 1; }

  /* ─── Submit button ─── */
  .btn-submit {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(99,131,255,0.85) 0%, rgba(168,85,247,0.85) 100%);
    color: #fff;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.02em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.35s cubic-bezier(0.22,1,0.36,1);
    box-shadow: 0 4px 20px rgba(99,131,255,0.3), 0 1px 0 rgba(255,255,255,0.2) inset;
  }

  .btn-submit::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 60%);
    border-radius: inherit;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,131,255,0.4), 0 1px 0 rgba(255,255,255,0.2) inset; }
  .btn-submit:hover::before { opacity: 1; }
  .btn-submit:active { transform: translateY(0) scale(0.98); }

  /* ─── Post cards ─── */
  .posts-section {
    animation: fadeUp 0.8s 0.3s cubic-bezier(0.22,1,0.36,1) both;
  }

  .posts-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .posts-title {
    font-size: 12px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase;
    color: var(--text-secondary); display:flex; align-items:center; gap:8px;
  }
  .posts-title::before { content:''; display:block; width:3px; height:14px; border-radius:2px; background: linear-gradient(to bottom, var(--accent2), var(--accent)); }

  .count-badge {
    background: rgba(120,180,255,0.15);
    border: 1px solid rgba(120,180,255,0.25);
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--accent);
    backdrop-filter: blur(8px);
    transition: all 0.3s;
  }

  .posts-list { display: flex; flex-direction: column; gap: 16px; }

  .post-card {
    padding: 24px 28px;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
    cursor: default;
  }

  .post-card::before {
    content: '';
    position: absolute; top:0; left:0; right:0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.4) 30%, rgba(255,255,255,0.4) 70%, transparent 100%);
  }

  .post-card:hover {
    transform: translateY(-3px) scale(1.005);
    box-shadow:
      0 2px 0 var(--glass-highlight) inset,
      0 -1px 0 rgba(0,0,0,0.1) inset,
      0 28px 80px rgba(0,0,0,0.25),
      0 8px 24px rgba(120,180,255,0.08);
  }

  .post-meta {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }

  .post-author {
    display: flex; align-items: center; gap: 10px;
  }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
    border: 1px solid rgba(255,255,255,0.2);
    flex-shrink: 0;
  }
  .author-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
  .author-tag { font-size: 11px; color: var(--text-secondary); margin-top:1px; }

  .post-time {
    font-size: 12px; color: var(--text-secondary);
    display: flex; align-items: center; gap: 5px;
  }

  .post-title-text {
    font-size: 17px; font-weight: 500; margin-bottom: 8px;
    line-height: 1.4; color: var(--text-primary);
  }
  .post-body {
    font-size: 14px; font-weight: 300; line-height: 1.7;
    color: var(--text-secondary);
  }

  .post-footer {
    margin-top: 16px; display:flex; align-items:center; gap:12px;
  }

  .reaction-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 100px;
    padding: 5px 12px;
    font-size: 13px; color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
    backdrop-filter: blur(8px);
  }
  .reaction-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.2);
    color: var(--text-primary);
    transform: scale(1.05);
  }
  .reaction-btn.liked {
    background: rgba(236,72,153,0.15);
    border-color: rgba(236,72,153,0.3);
    color: #f472b6;
  }

  .delete-btn {
    margin-left: auto;
    background: none; border: none;
    color: rgba(255,255,255,0.2);
    cursor: pointer; font-size: 16px;
    padding: 4px 8px; border-radius: 8px;
    transition: all 0.2s;
  }
  .delete-btn:hover { color: rgba(255,100,100,0.7); background: rgba(255,50,50,0.08); }

  /* ─── Empty state ─── */
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--text-secondary);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty-text { font-size: 15px; font-weight: 300; }

  /* ─── Animations ─── */
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(24px); }
    to   { opacity:1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity:0; transform: translateY(16px) scale(0.98); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: rgba(30,30,50,0.85);
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 100px;
    padding: 12px 24px;
    font-size: 14px;
    color: var(--text-primary);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    transition: transform 0.5s cubic-bezier(0.22,1,0.36,1), opacity 0.5s;
    opacity: 0;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius:10px; }

  /* ─── FAB ─── */
  .fab {
    position: fixed; bottom: 36px; right: 36px; z-index: 100;
    width: 60px; height: 60px; border-radius: 50%;
    background: linear-gradient(135deg, rgba(99,131,255,0.9), rgba(168,85,247,0.9));
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 8px 32px rgba(99,131,255,0.4), 0 1px 0 rgba(255,255,255,0.25) inset;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: #fff;
    transition: all 0.35s cubic-bezier(0.22,1,0.36,1);
  }
  .fab:hover { transform: scale(1.12) rotate(15deg); box-shadow: 0 12px 40px rgba(99,131,255,0.55); }
  .fab:active { transform: scale(0.95); }
  .fab.open { transform: rotate(45deg); background: linear-gradient(135deg, rgba(255,80,80,0.85), rgba(200,60,180,0.85)); }

  /* ─── Modal overlay ─── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 90;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s cubic-bezier(0.22,1,0.36,1);
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }

  /* ─── Modal card ─── */
  .modal-card {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 95;
    background: rgba(18,18,40,0.82);
    border: 1px solid rgba(255,255,255,0.18);
    border-bottom: none;
    border-radius: 28px 28px 0 0;
    backdrop-filter: blur(36px);
    -webkit-backdrop-filter: blur(36px);
    box-shadow: 0 -8px 48px rgba(0,0,0,0.4), 0 2px 0 rgba(255,255,255,0.12) inset;
    padding: 12px 28px 48px;
    transform: translateY(110%);
    transition: transform 0.45s cubic-bezier(0.22,1,0.36,1);
  }
  .modal-card.show { transform: translateY(0); }

  .modal-handle {
    width: 40px; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.2);
    margin: 0 auto 20px;
  }
  .modal-title {
    font-size: 18px; font-weight: 500; color: var(--text-primary);
    margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
  }
  .modal-title::before { content:''; display:block; width:3px; height:18px; border-radius:2px; background: linear-gradient(to bottom, var(--accent), var(--accent2)); }

</style>
</head>
<body>

<div class="bg">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>
</div>
<div class="noise"></div>

<div class="container">
  <!-- Header -->
  <header>
    <div class="logo-pill"><span></span>Liquid Glass Board</div>
    <h1>무엇이든<br>남겨보세요</h1>
    <p class="subtitle">당신의 생각이 여기 흐릅니다</p>
  </header>

  <!-- Modal overlay -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()"></div>

  <!-- Write modal -->
  <div class="modal-card" id="modal-card">
    <div class="modal-handle"></div>
    <div class="modal-title">새 글 작성</div>
    <div class="row">
      <div class="field-wrap">
        <input class="glass-input" id="inp-name" type="text" placeholder="이름 (닉네임)" maxlength="20">
      </div>
      <div class="field-wrap">
        <input class="glass-input" id="inp-title" type="text" placeholder="제목" maxlength="60">
      </div>
    </div>
    <div class="field-wrap">
      <textarea class="glass-textarea" id="inp-body" placeholder="내용을 입력하세요…" maxlength="500"></textarea>
    </div>
    <button class="btn-submit" onclick="submitPost()">✦ 게시하기</button>
  </div>

  <!-- FAB -->
  <button class="fab" id="fab" onclick="toggleModal()">+</button>

  <!-- Posts -->
  <div class="posts-section">
    <div class="posts-header">
      <div class="posts-title">게시물</div>
      <div class="count-badge" id="count-badge">0개</div>
    </div>
    <div class="posts-list" id="posts-list">
      <div class="empty">
        <div class="empty-icon">✦</div>
        <div class="empty-text">첫 번째 글을 남겨보세요</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API_KEY = "AIzaSyA7eH2Uuvi_QFlhE-APwRzqvj_F1i_0_6I";
  const PROJECT = "post-2cb5a";
  const BASE    = `https://firestore.googleapis.com/v1/projects/${PROJECT}/databases/(default)/documents`;

  async function fsGet() {
    try {
      const url = `${BASE}/posts?key=${API_KEY}`;
      const r = await fetch(url);
      const data = await r.json();
      if (!data.documents) return [];
      return data.documents.map(d => {
        const f = d.fields || {};
        return {
          id:    d.name.split('/').pop(),
          name:  f.name?.stringValue  || '익명',
          title: f.title?.stringValue || '',
          body:  f.body?.stringValue  || '',
          ts:    Number(f.ts?.integerValue || f.ts?.doubleValue || 0),
          likes: Number(f.likes?.integerValue || 0),
          liked: false
        };
      }).sort((a,b) => b.ts - a.ts);
    } catch(e) { console.error(e); return []; }
  }

  async function fsAdd(post) {
    const url = `${BASE}/posts?key=${API_KEY}`;
    await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields: {
        name:  { stringValue: post.name },
        title: { stringValue: post.title },
        body:  { stringValue: post.body },
        ts:    { integerValue: String(post.ts) },
        likes: { integerValue: "0" }
      }})
    });
  }

  async function fsDelete(id) {
    await fetch(`${BASE}/posts/${id}?key=${API_KEY}`, { method: 'DELETE' });
  }

  async function fsLike(id, likes) {
    await fetch(`${BASE}/posts/${id}?updateMask.fieldPaths=likes&key=${API_KEY}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields: { likes: { integerValue: String(likes) } } })
    });
  }

  const AVATAR_COLORS = [
    'linear-gradient(135deg,#6366f1,#8b5cf6)',
    'linear-gradient(135deg,#06b6d4,#3b82f6)',
    'linear-gradient(135deg,#10b981,#0891b2)',
    'linear-gradient(135deg,#f59e0b,#ef4444)',
    'linear-gradient(135deg,#ec4899,#a855f7)',
    'linear-gradient(135deg,#f97316,#eab308)',
  ];

  let posts = [];

  function colorFor(name) {
    let h = 0;
    for (let i=0; i<name.length; i++) h = (h*31 + name.charCodeAt(i)) & 0xffffffff;
    return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
  }

  function timeSince(ts) {
    const s = Math.floor((Date.now()-ts)/1000);
    if (s<60) return '방금 전';
    if (s<3600) return Math.floor(s/60)+'분 전';
    if (s<86400) return Math.floor(s/3600)+'시간 전';
    return Math.floor(s/86400)+'일 전';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=> t.classList.remove('show'), 2200);
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    const list = document.getElementById('posts-list');
    const badge = document.getElementById('count-badge');
    badge.textContent = posts.length + '개';

    if (posts.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">✦</div><div class="empty-text">첫 번째 글을 남겨보세요</div></div>`;
      return;
    }

    list.innerHTML = posts.map((p, i) => `
      <div class="glass post-card" style="animation-delay:${i*0.06}s">
        <div class="post-meta">
          <div class="post-author">
            <div class="avatar" style="background:${colorFor(p.name)}">${escHtml(p.name[0].toUpperCase())}</div>
            <div>
              <div class="author-name">${escHtml(p.name)}</div>
              <div class="author-tag">작성자</div>
            </div>
          </div>
          <div class="post-time">⏱ ${timeSince(p.ts)}</div>
        </div>
        <div class="post-title-text">${escHtml(p.title)}</div>
        <div class="post-body">${escHtml(p.body).replace(/\n/g,'<br>')}</div>
        <div class="post-footer">
          <button class="reaction-btn ${p.liked?'liked':''}" data-like="${p.id}">
            ${p.liked?'♥':'♡'} ${p.likes}
          </button>
          <button class="delete-btn" data-delete="${p.id}" title="삭제">✕</button>
        </div>
      </div>
    `).join('');

    // 이벤트 위임
    list.querySelectorAll('[data-like]').forEach(btn => {
      btn.onclick = () => toggleLike(btn.dataset.like);
    });
    list.querySelectorAll('[data-delete]').forEach(btn => {
      btn.onclick = () => deletePost(btn.dataset.delete);
    });
  }

  // ── 글 목록 polling (3초마다) ──────────────────────────
  async function loadPosts() {
    posts = await fsGet();
    render();
  }

  // 글 등록
  window.submitPost = async function() {
    const name  = document.getElementById('inp-name').value.trim() || '익명';
    const title = document.getElementById('inp-title').value.trim();
    const body  = document.getElementById('inp-body').value.trim();
    if (!title) { showToast('제목을 입력해주세요'); return; }
    if (!body)  { showToast('내용을 입력해주세요'); return; }
    try {
      await fsAdd({ name, title, body, ts: Date.now() });
      document.getElementById('inp-title').value = '';
      document.getElementById('inp-body').value = '';
      showToast('✦ 게시물이 등록되었습니다');
      closeModal();
      loadPosts();
    } catch(e) { showToast('오류가 발생했습니다'); console.error(e); }
  };

  async function toggleLike(id) {
    const p = posts.find(x=>x.id===id);
    if (!p) return;
    p.liked = !p.liked;
    const newLikes = Math.max(0, (p.likes||0) + (p.liked ? 1 : -1));
    p.likes = newLikes;
    render();
    try { await fsLike(id, newLikes); } catch(e) { console.error(e); }
  }

  async function deletePost(id) {
    try {
      await fsDelete(id);
      showToast('삭제되었습니다');
      loadPosts();
    } catch(e) { showToast('삭제 실패'); console.error(e); }
  }

  // Cmd+Enter 단축키
  document.getElementById('inp-body').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) window.submitPost();
  });


  function toggleModal() {
    const fab = document.getElementById('fab');
    const card = document.getElementById('modal-card');
    const overlay = document.getElementById('modal-overlay');
    const isOpen = card.classList.contains('show');
    if (isOpen) {
      closeModal();
    } else {
      fab.classList.add('open');
      card.classList.add('show');
      overlay.classList.add('show');
      setTimeout(() => document.getElementById('inp-name').focus(), 400);
    }
  }

  function closeModal() {
    document.getElementById('fab').classList.remove('open');
    document.getElementById('modal-card').classList.remove('show');
    document.getElementById('modal-overlay').classList.remove('show');
  }

  loadPosts();
  setInterval(loadPosts, 5000);
</script>
</body>
</html>
